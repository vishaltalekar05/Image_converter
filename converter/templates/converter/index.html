{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Converter</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="card">
  <h1>Image Converter</h1>
  <p class="tagline">Convert PNG ↔ JPG for free</p>
  <hr>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="field">
      <label class="lbl">Select Image</label>
      <input type="file" name="image" accept="image/png,image/jpeg" required>
    </div>

    <div class="field">
      <label class="lbl">Convert To</label>
      <select name="format">
        <option value="jpg">Convert to JPG</option>
        <option value="png">Convert to PNG</option>
      </select>
    </div>

    <div class="field">
      <label class="lbl">Target Size (KB) — Optional</label>
      <input type="number" name="target_kb" min="10" max="10000"
             placeholder="Ex: 50">
      <p class="hint">Enter target KB · Only for JPG · Leave empty for no compression</p>
    </div>

    <button type="submit">Convert & Download</button>
  </form>

  {% if error_msg %}
  <div class="error">{{ error_msg }}</div>
  {% endif %}

</div>

</body>
</html>
